var copyGuidebook = tasks.register('copyGuidebook', Sync) {
    group = 'build'

    from('guidebook') {
        into 'assets/neoecoae/ae2guide'
    }
    into guidebookResourcesDir
}

tasks.register('verifyNoUnexpectedResourceOverrides') {
    group = 'verification'
    description = 'Fails when handwritten resources shadow generated resources without an explicit allowlist entry.'

    inputs.dir('src/main/resources')
    inputs.dir('src/generated/resources')
    inputs.property('handwrittenResourceOverrides', handwrittenResourceOverrides.toList().sort())

    doLast {
        def mainResourcesDir = file('src/main/resources').toPath().toAbsolutePath().normalize()
        def generatedDir = file('src/generated/resources').toPath().toAbsolutePath().normalize()
        if (!generatedDir.toFile().exists()) {
            return
        }

        def unexpected = []
        fileTree('src/main/resources').matching {
            include '**/*'
        }.files.each { mainFile ->
            if (!mainFile.isFile()) {
                return
            }

            def relativePath = mainResourcesDir.relativize(mainFile.toPath().toAbsolutePath().normalize())
                    .toString()
                    .replace('\\', '/')
            if (generatedDir.resolve(relativePath).toFile().isFile()
                    && !handwrittenResourceOverrides.contains(relativePath)) {
                unexpected.add(relativePath)
            }
        }

        if (!unexpected.isEmpty()) {
            throw new GradleException(
                    "Handwritten resources unexpectedly shadow generated resources:\n"
                            + unexpected.sort().collect { " - ${it}" }.join('\n')
                            + "\nMove these files to datagen or add an explicit allowlist entry if the override is intentional.")
        }
    }
}

processResources.dependsOn generateModMetadata
tasks.named('processResources', ProcessResources).configure {
    dependsOn copyGuidebook
    dependsOn 'verifyNoUnexpectedResourceOverrides'
    from guidebookResourcesDir

    exclude { details ->
        def path = details.file.toPath().toAbsolutePath().normalize()
        path.startsWith(generatedResourcesDir)
                && handwrittenResourceOverrides.contains(details.relativePath.pathString.replace('\\', '/'))
    }
    duplicatesStrategy = DuplicatesStrategy.FAIL
}

jar {
    finalizedBy 'reobfJar'

    manifest {
        attributes([
                "Specification-Title"     : mod_id,
                "Specification-Vendor"    : mod_authors,
                "Specification-Version"   : "1",
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : project.jar.archiveVersion,
                "Implementation-Vendor"   : mod_authors,
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs"            : "${mod_id}.mixins.json"
        ])
    }
}

def slimJarFile = layout.buildDirectory.file("libs/${base.archivesName.get()}-${version}-slim.jar")

tasks.matching { it.name == 'reobfJar' }.configureEach {
    outputs.file(slimJarFile)

    doLast {
        def output = slimJarFile.get().asFile
        output.parentFile.mkdirs()
        output.delete()
        ant.zip(destfile: output) {
            zipfileset(src: tasks.named('jar', Jar).get().archiveFile.get().asFile, excludes: 'META-INF/jarjar/**')
        }
        logger.lifecycle("Slim jar written to ${output}")
    }
}

tasks.register('prepareReleaseJar') {
    group = 'build'
    description = 'Copies the reobfuscated jarjar artifact to the canonical release jar name.'
    dependsOn 'reobfJarJar'

    doLast {
        def releaseJarName = "${base.archivesName.get()}-${version}.jar"
        copy {
            from(layout.buildDirectory.file("libs/${base.archivesName.get()}-${version}-all.jar"))
            into(layout.buildDirectory.dir('libs'))
            rename { releaseJarName }
        }
    }
}

tasks.register('verifyReleaseJar') {
    group = 'verification'
    description = 'Verifies that the distributable jar is reobfuscated and contains the expected production mixins.'
    dependsOn 'prepareReleaseJar'

    doLast {
        def jarFile = tasks.named('jar', Jar).get().archiveFile.get().asFile
        def zip = new java.util.zip.ZipFile(jarFile)

        try {
            def creativeTabsEntry = zip.getEntry('cn/dancingsnow/neoecoae/all/NECreativeTabs.class')
            if (creativeTabsEntry == null) {
                throw new GradleException("Release jar is missing NECreativeTabs.class: ${jarFile}")
            }

            def creativeTabsClass = new String(
                    zip.getInputStream(creativeTabsEntry).bytes,
                    java.nio.charset.StandardCharsets.ISO_8859_1)
            if (creativeTabsClass.contains('CREATIVE_MODE_TAB')) {
                throw new GradleException(
                        "Release jar is not reobfuscated. Run reobfJar before distributing: ${jarFile}")
            }

            if (zip.getEntry('cn/dancingsnow/neoecoae/mixins/StorageCellsMixin.class') == null) {
                throw new GradleException("Release jar is missing StorageCellsMixin.class: ${jarFile}")
            }

            if (zip.getEntry('cn/dancingsnow/neoecoae/gui/ldlib/support/NEPagedItemTransfer.class') == null) {
                throw new GradleException("Release jar is missing NEPagedItemTransfer.class: ${jarFile}")
            }

            if (zip.getEntry('cn/dancingsnow/neoecoae/mixins/IOPortBlockEntityMixin.class') != null) {
                throw new GradleException("Release jar still contains the removed IO port ticking mixin: ${jarFile}")
            }

            def mixinConfigEntry = zip.getEntry("${mod_id}.mixins.json")
            if (mixinConfigEntry == null) {
                throw new GradleException("Release jar is missing ${mod_id}.mixins.json: ${jarFile}")
            }

            if (zip.getEntry('META-INF/jarjar/metadata.json') == null) {
                throw new GradleException("Release jar is missing jarjar metadata: ${jarFile}")
            }
        } finally {
            zip.close()
        }
    }
}

tasks.register('release', Copy) {
    group = 'build'
    description = 'Builds the production reobfuscated mod jar and copies it to build/release.'
    dependsOn 'verifyReleaseJar'

    from(tasks.named('jar', Jar).flatMap { it.archiveFile })
    into(layout.buildDirectory.dir('release'))

    doFirst {
        delete layout.buildDirectory.dir('release')
    }

    doLast {
        logger.lifecycle("Release jar written to ${destinationDir}")
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url = "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('test', Test).configure {
    useJUnitPlatform()
}

tasks.named('check').configure {
    dependsOn 'spotlessCheck'
    dependsOn 'verifyNoUnexpectedResourceOverrides'
}

tasks.named('compileJava', JavaCompile).configure {
    dependsOn 'createMcpToSrg'
    def refmapFile = layout.buildDirectory.file("generated/refmap/${mod_id}.refmap.json").get().asFile
    def tsrgFile = layout.buildDirectory.file('createMcpToSrg/output.tsrg').get().asFile
    options.compilerArgs += [
            "-AoutRefMapFile=${refmapFile.absolutePath}",
            "-AdefaultObfuscationEnv=searge",
            "-AreobfTsrgFile=${tsrgFile.absolutePath}"
    ]
    outputs.file(refmapFile)
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

tasks.register('sourcesJar', Jar) {
    from sourceSets.main.java
    archiveClassifier = "sources"
}

artifacts {
    archives sourcesJar
}

lombok {
    version = "1.18.34"
}
